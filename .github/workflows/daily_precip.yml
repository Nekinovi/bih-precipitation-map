name: Daily Precipitation Map Update

on:
  schedule:
    - cron: '30 5 * * *'  # Pokreće se svaki dan u 5:30 UTC (6:30 po našem vremenu)
  workflow_dispatch:       # Omogućava ti i ručno pokretanje

jobs:
  update-map:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests numpy folium tenacity
        
    - name: Run script and update map
      run: |
        python -u update_precip_map.py 2>&1 | tee output.log
        cat output.log
    
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add docs/index.html bi_border.geojson
        git commit -m "Ažurirana mapa padavina za $(date +'%Y-%m-%d')" || echo "No changes to commit"
        git push
