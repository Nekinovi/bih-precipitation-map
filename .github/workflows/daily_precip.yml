name: Daily Precipitation Map Update

on:
  workflow_dispatch:
  schedule:
    - cron: '50 * * * *'
  

permissions:
  contents: write   # Ovo omogućava pisanje u repozitorij

jobs:
  update-map:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests numpy folium tenacity pandas openmeteo-requests 

          
      - name: Run script and update map
        run: python -u update_precip_map.py 2>&1
        
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git fetch origin main
          git rebase origin/main || true
          git add docs/index.html bi_border.geojson || true
          git commit -m "Ažurirana mapa padavina za $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
