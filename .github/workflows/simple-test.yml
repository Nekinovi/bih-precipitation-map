name: Scheduled Simple Test

on:
  # Runs automatically on a cron schedule (Every day at 08:00 UTC)
  schedule:
    - cron: '*/12 * * * *'
  
  # Allows you to manually trigger the test anytime from the Actions UI
  workflow_dispatch: 

jobs:
